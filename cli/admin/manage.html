<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Career Recruit Admin Management">
  <meta name="author" content="Career Recruit">
  <title>Management :: Career Recruit Admin</title>
  <link rel="shortcut icon" href="../assets/img/favicon.ico" type="image/x-icon">
  <link href="../assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/icofont.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="wrapper">
    <header class="header-area">
      <div class="container">
        <div class="row no-gutter align-items-center position-relative">
          <div class="col-12">
            <div class="header-align">
              <div class="header-align-start">
                <div class="header-logo-area">
                  <a href="../index.html">
                    <img class="logo-main" src="../assets/img/career-recruit-logo.png" alt="Career Recruit logo">
                  </a>
                </div>
              </div>
              <div class="header-align-end">
                <div class="header-action-area">
                  <a class="btn-registration" href="../login.html">Login</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content admin-main" data-admin-page>
      <section class="admin-dashboard-area">
        <div class="container">
          <div class="admin-dashboard-head">
            <div>
              <span class="admin-kicker">Career Recruit Admin</span>
              <h1>Management</h1>
            </div>
            <p data-admin-status></p>
          </div>

          <div class="admin-subnav">
            <a href="./">Dashboard</a>
            <a href="#payment-settings">Payment Settings</a>
            <a href="#enrollment-management">Enrollment Management</a>
          </div>

          <div class="row mt-4">
            <div class="col-lg-5" id="payment-settings">
              <div class="admin-panel">
                <div class="form-title">
                  <h4 class="title">Payment Settings</h4>
                </div>
                <form action="#" data-admin-payment-form>
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group">
                        <input class="form-control" type="number" step="0.01" name="registration_fee" placeholder="Employer fee" required>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group">
                        <input class="form-control" type="text" name="fee_currency" placeholder="Currency" required>
                      </div>
                    </div>
                    <div class="col-12">
                      <div class="form-group">
                        <input class="form-control" type="text" name="wallet_name" placeholder="Wallet name" required>
                      </div>
                    </div>
                    <div class="col-12">
                      <div class="form-group">
                        <input class="form-control" type="text" name="wallet_address" placeholder="Wallet address" required>
                      </div>
                    </div>
                    <div class="col-12">
                      <button type="submit" class="btn-theme">Save Settings</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
            <div class="col-lg-7" id="enrollment-management">
              <div class="admin-panel">
                <div class="form-title">
                  <h4 class="title">Enrollment Management</h4>
                </div>
                <div data-pending-employers></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../assets/js/api.js"></script>
</body>
</html>
