<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Career Recruit Candidate Management">
  <meta name="author" content="Career Recruit">
  <title>Candidates :: Career Recruit Admin</title>
  <link rel="shortcut icon" href="../assets/img/favicon.ico" type="image/x-icon">
  <link href="../assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/icofont.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="wrapper">
    <header class="header-area">
      <div class="container">
        <div class="row no-gutter align-items-center position-relative">
          <div class="col-12">
            <div class="header-align">
              <div class="header-align-start">
                <div class="header-logo-area">
                  <a href="../index.html">
                    <img class="logo-main" src="../assets/img/career-recruit-logo-transparent.png" alt="Career Recruit logo">
                  </a>
                </div>
              </div>
              <div class="header-align-end">
                <div class="header-action-area">
                  <a class="btn-registration" href="../login.html">Login</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content admin-main" data-admin-page>
      <section class="admin-dashboard-area">
        <div class="container">
          <div class="admin-dashboard-head">
            <div>
              <span class="admin-kicker">Career Recruit Admin</span>
              <h1>Candidates</h1>
            </div>
            <p data-admin-status></p>
          </div>

          <div class="admin-management-layout">
            <aside class="admin-subnav" aria-label="Admin navigation">
              <a href="./"><i class="icofont-dashboard"></i><span>Dashboard</span></a>
              <a href="manage.html#payment-settings"><i class="icofont-settings"></i><span>Payment Settings</span></a>
              <a href="manage.html#enrollment-management"><i class="icofont-ui-user-group"></i><span>Enrollment Management</span></a>
              <a href="categories.html"><i class="icofont-list"></i><span>Categories</span></a>
              <a href="jobs.html"><i class="icofont-briefcase"></i><span>Jobs</span></a>
              <a href="candidates.html"><i class="icofont-users-alt-4"></i><span>Candidates</span></a>
              <a href="testimonials.html"><i class="icofont-quote-left"></i><span>Testimonials</span></a>
            </aside>

            <div class="admin-management-content">
              <div class="admin-panel">
                <div class="form-title">
                  <h4 class="title">Candidate Form</h4>
                </div>
                <form action="#" data-candidate-form>
                  <input type="hidden" name="id">
                  <div class="admin-form-grid">
                    <input class="form-control" type="text" name="first_name" placeholder="First name" required>
                    <input class="form-control" type="text" name="last_name" placeholder="Last name" required>
                    <input class="form-control" type="email" name="email" placeholder="Email" required>
                    <input class="form-control" type="text" name="phone" placeholder="Phone">
                    <input class="form-control" type="text" name="title" placeholder="Title" required>
                    <input class="form-control" type="text" name="category" placeholder="Category">
                    <input class="form-control" type="text" name="location" placeholder="Location">
                    <input class="form-control" type="text" name="offered_salary" placeholder="Offered salary">
                    <input class="form-control" type="text" name="experience" placeholder="Experience">
                    <input class="form-control" type="text" name="language" placeholder="Language">
                    <input class="form-control" type="text" name="age" placeholder="Age">
                    <input class="form-control" type="text" name="gender" placeholder="Gender">
                    <input class="form-control" type="text" name="qualification" placeholder="Qualification">
                    <input class="form-control" type="text" name="level" placeholder="Level">
                    <input class="form-control" type="number" name="views" placeholder="Views" min="0">
                    <input class="form-control" type="text" name="photo_url" placeholder="Photo URL">
                    <input class="form-control admin-span-2" type="text" name="resume_url" placeholder="Resume URL">
                    <textarea class="form-control admin-span-2" name="skills" rows="3" placeholder="Skills, separated with commas"></textarea>
                    <textarea class="form-control admin-span-2" name="bio" rows="4" placeholder="About candidate"></textarea>
                    <textarea class="form-control admin-span-2" name="education" rows="4" placeholder="Education. Use: Title // Years // School // Description | Next item"></textarea>
                    <textarea class="form-control admin-span-2" name="work_experience" rows="4" placeholder="Work experience. Use: Role // Years // Company // Description | Next item"></textarea>
                    <textarea class="form-control admin-span-2" name="professional_skills" rows="3" placeholder="Professional skills, separated with commas"></textarea>
                    <textarea class="form-control admin-span-2" name="software_skills" rows="3" placeholder="Software skills, separated with commas"></textarea>
                  </div>
                  <div class="admin-actions admin-form-actions">
                    <button type="submit" class="btn-theme">Save Candidate</button>
                    <button type="button" class="admin-secondary-btn" data-reset-form>Clear</button>
                  </div>
                </form>
              </div>

              <div class="admin-panel">
                <div class="form-title">
                  <h4 class="title">Candidate Profiles</h4>
                </div>
                <div data-admin-candidates></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../assets/js/api.js"></script>
</body>
</html>
