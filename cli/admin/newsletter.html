<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Career Recruit Newsletter Management">
  <meta name="author" content="Career Recruit">
  <title>Newsletter :: Career Recruit Admin</title>
  <link rel="shortcut icon" href="../assets/img/favicon.ico" type="image/x-icon">
  <link href="../assets/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/icofont.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="wrapper">
    <header class="header-area">
      <div class="container">
        <div class="row no-gutter align-items-center position-relative">
          <div class="col-12">
            <div class="header-align">
              <div class="header-align-start">
                <div class="header-logo-area">
                  <a href="../index.html">
                    <img class="logo-main" src="../assets/img/career-recruit-logo-transparent.png" alt="Career Recruit logo">
                  </a>
                </div>
              </div>
              <div class="header-align-end">
                <div class="header-action-area">
                  <a class="btn-registration" href="../login.html">Login</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content admin-main" data-admin-page>
      <section class="admin-dashboard-area">
        <div class="container">
          <div class="admin-dashboard-head">
            <div>
              <span class="admin-kicker">Career Recruit Admin</span>
              <h1>Newsletter</h1>
            </div>
            <p data-admin-status></p>
          </div>

          <div class="admin-management-layout">
            <aside class="admin-subnav" aria-label="Admin navigation">
              <a href="./"><i class="icofont-dashboard"></i><span>Dashboard</span></a>
              <a href="manage.html#payment-settings"><i class="icofont-settings"></i><span>Payment Settings</span></a>
              <a href="manage.html#enrollment-management"><i class="icofont-ui-user-group"></i><span>Enrollment Management</span></a>
              <a href="categories.html"><i class="icofont-list"></i><span>Categories</span></a>
              <a href="jobs.html"><i class="icofont-briefcase"></i><span>Jobs</span></a>
              <a href="candidates.html"><i class="icofont-users-alt-4"></i><span>Candidates</span></a>
              <a href="testimonials.html"><i class="icofont-quote-left"></i><span>Testimonials</span></a>
              <a href="comments.html"><i class="icofont-comment"></i><span>Blog Comments</span></a>
              <a href="newsletter.html"><i class="icofont-email"></i><span>Newsletter</span></a>
            </aside>

            <div class="admin-management-content">
              <div class="admin-panel">
                <div class="form-title">
                  <h4 class="title">Subscribers</h4>
                </div>
                <div data-admin-newsletter-subscribers></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../assets/js/api.js"></script>
</body>
</html>
